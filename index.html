<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F4ECDB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Guia de Vinhos · Terrazza Duomo 21</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#F4ECDB; --surface:#FFFDF8; --line:#E7DCC3; --ink:#2A2118; --ink2:#403525;
 --muted:#8A7B62; --gold:#A9842F; --gold2:#B49A63; --soft:#FAF4E6;
 --c-Rosso:#6E2433; --c-Champagne:#A9842F; --c-Spumante:#C2A24A;
 --c-Bianco:#7A8450; --c-Rosato:#C77F86; --c-Dolce:#B5762A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);}
img{display:block;}
/* HEADER */
header{position:sticky;top:0;z-index:30;background:rgba(244,236,219,.92);backdrop-filter:blur(12px);
 border-bottom:1px solid var(--line);padding:14px 18px 10px;padding-top:max(14px,env(safe-area-inset-top));}
.brand{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
.brand h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;line-height:1;color:var(--ink);}
.brand .sub{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.search{margin-top:11px;position:relative;}
.search input{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:30px;
 padding:11px 16px 11px 40px;font:inherit;font-size:14px;color:var(--ink);}
.search input::placeholder{color:#B7A98E;}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--gold2);}
.chips{display:flex;gap:8px;overflow-x:auto;padding:11px 2px 2px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface);
 border:1px solid var(--line);padding:7px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.chip.on{color:#fff;background:var(--ink);border-color:var(--ink);}
.count{font-size:11px;color:var(--muted);padding:6px 2px 0;}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;padding:14px 16px 40px;max-width:780px;margin:0 auto;}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;
 display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s;position:relative;}
.card:active{transform:scale(.97);}
.card .ph{height:150px;display:flex;align-items:center;justify-content:center;padding:14px;position:relative;
 background:radial-gradient(circle at 50% 38%,var(--g) 0%,transparent 62%);}
.card .ph::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.5),transparent 60%);mix-blend-mode:overlay;}
.card .ph img{max-height:122px;max-width:78%;object-fit:contain;filter:drop-shadow(0 6px 10px rgba(80,50,20,.22));}
.card .tag{position:absolute;top:9px;left:9px;font-size:8.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
 color:#fff;padding:3px 8px;border-radius:12px;}
.card .info{padding:10px 12px 13px;border-top:1px solid var(--line);}
.card .nm{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:17px;line-height:1.06;color:var(--ink);}
.card .pr{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gold2);margin-top:4px;}
.card .pz{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-top:5px;color:var(--accent);}
/* DETAIL */
.detail{position:fixed;inset:0;z-index:60;background:var(--bg);overflow-y:auto;transform:translateY(100%);
 transition:transform .32s cubic-bezier(.22,.61,.36,1);-webkit-overflow-scrolling:touch;}
.detail.show{transform:translateY(0);}
.dback{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:13px 16px;
 padding-top:max(13px,env(safe-area-inset-top));background:rgba(244,236,219,.9);backdrop-filter:blur(10px);
 border-bottom:1px solid var(--line);font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;}
.dback svg{width:18px;height:18px;stroke:var(--ink);}
.dwrap{max-width:680px;margin:0 auto;padding:0 18px 60px;}
.hero{display:flex;justify-content:center;padding:22px 0 6px;position:relative;}
.hero::before{content:"";position:absolute;top:6%;left:50%;transform:translateX(-50%);width:260px;height:260px;
 border-radius:50%;background:radial-gradient(circle,var(--g) 0%,transparent 66%);opacity:.9;}
.hero img{max-height:260px;max-width:62%;object-fit:contain;position:relative;filter:drop-shadow(0 16px 22px rgba(80,50,20,.3));}
.dtag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#fff;
 background:var(--accent);padding:5px 13px;border-radius:20px;}
.dhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-top:12px;}
.dname{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;line-height:1.02;color:var(--ink);}
.dprod{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:8px;}
.dmeta{font-size:12.5px;color:var(--muted);margin-top:6px;}
.dprice{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--accent);white-space:nowrap;}
.sec{margin-top:20px;}
.lbl{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px;}
.sec p{font-size:14px;line-height:1.62;color:var(--ink2);}
.grapes{display:flex;flex-wrap:wrap;gap:7px;}
.grape{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;background:var(--soft);
 border:1px solid var(--line);padding:4px 11px;border-radius:8px;}
.perfil{display:flex;flex-direction:column;gap:10px;}
.bar{display:grid;grid-template-columns:62px 1fr 62px;align-items:center;gap:10px;}
.bar .bl{text-align:right;font-size:11px;font-weight:700;color:#5B4D38;}
.bar .br{text-align:left;font-size:11px;color:var(--gold2);}
.dots{display:flex;gap:6px;justify-content:center;}
.dot{width:13px;height:13px;border-radius:50%;border:1.6px solid var(--accent);}
.dot.on{background:var(--accent);}
.tipos{display:flex;flex-wrap:wrap;gap:7px;}
.tipo{font-size:12px;font-weight:600;color:#B7A98E;background:var(--surface);border:1px solid var(--line);
 padding:6px 12px;border-radius:20px;}
.tipo.on{color:#fff;background:var(--accent);border-color:var(--accent);font-weight:700;}
.serv{display:flex;gap:12px;}
.servbox{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px;}
.servbox .k{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2);}
.servbox .v{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;margin-top:4px;color:var(--ink);}
.frase{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;line-height:1.45;color:var(--ink);
 margin-top:22px;padding:15px 20px;background:var(--soft);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;}
</style>
</head>

 list.forEach(w=>{
  const i=WINES.indexOf(w);
  const el=document.createElement('div');el.className='card';
  el.style.setProperty('--g',w.col); el.style.setProperty('--accent','var(--c-'+w.cat+')');
  el.innerHTML=`<div class="ph"><span class="tag" style="background:var(--c-${w.cat})">${CATPT[w.cat]}</span>
   <img loading="lazy" src="${w.img}" alt="" onerror="this.style.opacity=0"></div>
   <div class="info"><div class="nm">${w.nm}</div><div class="pr">${w.pr}</div><div class="pz">${w.pz||''}</div></div>`;
  el.onclick=()=>openDetail(i); grid.appendChild(el);
 });
}
function dots(n){let s='';for(let i=0;i<6;i++)s+=`<span class="dot${i<n?' on':''}"></span>`;return s;}
function bars(p){return p.map(b=>`<div class="bar"><span class="bl">${b[0]}</span><span class="dots">${dots(b[2])}</span><span class="br">${b[1]}</span></div>`).join('');}
function grapes(g){return g.split(/\s*·\s*/).map(x=>`<span class="grape">${x}</span>`).join('');}
const ALLT=['Massas','Arroz','Molhos','Carne vermelha','Frango','Peixe','Salmão','Lagosta','Polvo','Bolognesa','Tartufo','Saladas','Pizza','Doces'];
function tipos(t){return ALLT.map(x=>`<span class="tipo${t.includes(x)?' on':''}">${x}</span>`).join('');}

const detail=document.getElementById('detail'), dwrap=document.getElementById('dwrap');
function openDetail(i){
 const w=WINES[i];
 detail.style.setProperty('--accent','var(--c-'+w.cat+')'); detail.style.setProperty('--g',w.col);
 dwrap.innerHTML=`
  <div class="hero" style="--g:${w.col}"><img src="${w.img}" onerror="this.style.display='none'"></div>
  <div style="text-align:center"><span class="dtag">${CATPT[w.cat]}</span></div>
  <div class="dhead"><div><div class="dname">${w.nm}</div><div class="dprod">${w.pr}</div>
    <div class="dmeta">${w.reg}</div></div><div class="dprice">${w.pz||''}</div></div>
  ${w.gr?`<div class="sec"><div class="lbl">Composição</div><div class="grapes">${grapes(w.gr)}</div></div>`:''}
  <div class="sec"><div class="lbl">Perfil</div><div class="perfil">${bars(w.perfil)}</div></div>
  ${w.desc?`<div class="sec"><div class="lbl">Sobre o vinho</div><p>${w.desc}</p></div>`:''}
  <div class="sec"><div class="lbl">Harmonização por tipologia</div><div class="tipos">${tipos(w.tipos)}</div></div>
  <div class="sec"><div class="serv">
    <div class="servbox"><div class="k">Decantação</div><div class="v">${w.decant}</div></div>
    <div class="servbox"><div class="k">Temperatura</div><div class="v">${w.temp}</div></div></div></div>
  ${w.scr?`<div class="frase">“${w.scr}”</div>`:''}`;
 detail.scrollTop=0; detail.classList.add('show'); history.pushState({d:1},'');
}
function closeDetail(){detail.classList.remove('show');}
document.getElementById('dback').onclick=()=>{if(history.state&&history.state.d)history.back();else closeDetail();};
window.addEventListener('popstate',()=>{if(detail.classList.contains('show'))closeDetail();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&detail.classList.contains('show'))history.back();});
render();
</script>
</body></html>
