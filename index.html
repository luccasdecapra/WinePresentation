<style>
:root{--bg:#F4ECDB;--surface:#FFFDF8;--line:#E7DCC3;--ink:#2A2118;--ink2:#403525;--muted:#8A7B62;--gold:#A9842F;--gold2:#B49A63;--soft:#FAF4E6;
--c-Rosso:#6E2433;--c-Champagne:#A9842F;--c-Spumante:#C2A24A;--c-Bianco:#7A8450;--c-Rosato:#C77F86;--c-Dolce:#B5762A;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);}
img{display:block;}
header{position:sticky;top:0;z-index:30;background:rgba(244,236,219,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 18px 10px;padding-top:max(14px,env(safe-area-inset-top));}
.brand{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;line-height:1;}
.brand .sub{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.langs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:3px;}
.lang{font-size:11px;font-weight:700;color:var(--muted);padding:5px 9px;border-radius:16px;cursor:pointer;letter-spacing:.04em;}
.lang.on{background:var(--ink);color:#fff;}
.search{margin-top:11px;position:relative;}
.search input{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:30px;padding:11px 16px 11px 40px;font:inherit;font-size:14px;color:var(--ink);}
.search input::placeholder{color:#B7A98E;}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--gold2);}
.chips{display:flex;gap:8px;overflow-x:auto;padding:11px 2px 2px;scrollbar-width:none;}.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:7px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.chip.on{color:#fff;background:var(--ink);border-color:var(--ink);}
.count{font-size:11px;color:var(--muted);padding:6px 2px 0;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;padding:14px 16px 40px;max-width:780px;margin:0 auto;}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform .15s;position:relative;}
.card:active{transform:scale(.97);}
.card .ph{height:150px;display:flex;align-items:center;justify-content:center;padding:14px;position:relative;background:radial-gradient(circle at 50% 38%,var(--g) 0%,transparent 62%);}
.card .ph img{max-height:122px;max-width:78%;object-fit:contain;filter:drop-shadow(0 6px 10px rgba(80,50,20,.22));}
.card .tag{position:absolute;top:9px;left:9px;font-size:8.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#fff;padding:3px 8px;border-radius:12px;}
.card .info{padding:10px 12px 13px;border-top:1px solid var(--line);}
.card .nm{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:17px;line-height:1.06;}
.card .pr{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gold2);margin-top:4px;}
.card .pz{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-top:5px;color:var(--accent);}
.detail{position:fixed;inset:0;z-index:60;background:var(--bg);overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.22,.61,.36,1);-webkit-overflow-scrolling:touch;}
.detail.show{transform:translateY(0);}
.dback{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:13px 16px;padding-top:max(13px,env(safe-area-inset-top));background:rgba(244,236,219,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);font-weight:700;font-size:14px;cursor:pointer;}
.dback svg{width:18px;height:18px;stroke:var(--ink);}
.dwrap{max-width:680px;margin:0 auto;padding:0 18px 60px;}
.hero{display:flex;justify-content:center;padding:22px 0 6px;position:relative;}
.hero::before{content:"";position:absolute;top:6%;left:50%;transform:translateX(-50%);width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,var(--g) 0%,transparent 66%);opacity:.9;}
.hero img{max-height:260px;max-width:62%;object-fit:contain;position:relative;filter:drop-shadow(0 16px 22px rgba(80,50,20,.3));}
.dtag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:var(--accent);padding:5px 13px;border-radius:20px;}
.dhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-top:12px;}
.dname{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;line-height:1.02;}
.dprod{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:8px;}
.dmeta{font-size:12.5px;color:var(--muted);margin-top:6px;}
.dprice{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--accent);white-space:nowrap;}
.sec{margin-top:20px;}
.lbl{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px;}
.sec p{font-size:14px;line-height:1.62;color:var(--ink2);}
.grapes{display:flex;flex-wrap:wrap;gap:7px;}
.grape{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;background:var(--soft);border:1px solid var(--line);padding:4px 11px;border-radius:8px;}

.tipos{display:flex;flex-wrap:wrap;gap:7px;}
.tipo{font-size:12px;font-weight:600;color:#B7A98E;background:var(--surface);border:1px solid var(--line);padding:6px 12px;border-radius:20px;}
.tipo.on{color:#fff;background:var(--accent);border-color:var(--accent);font-weight:700;}
.serv{display:flex;gap:12px;}
.servbox{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px;}
.servbox .k{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2);}
.servbox .v{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-top:4px;}
.frase{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;line-height:1.45;margin-top:22px;padding:15px 20px;background:var(--soft);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;}
.decnote{margin-top:11px;font-size:12.5px;line-height:1.55;color:var(--ink2);background:var(--soft);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:10px 14px;}.decnote .declbl{display:block;font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);margin-bottom:4px;}.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;}
</style></head><body>

const I18N={

const CATPT={Spumante:{pt:'Espumante',it:'Spumante',en:'Sparkling'},Champagne:{pt:'Champagne',it:'Champagne',en:'Champagne'},

const ALLT=['Massas','Arroz','Molhos','Carne vermelha','Frango','Peixe','Salmão','Lagosta','Polvo','Bolognesa','Tartufo','Saladas','Pizza','Doces'];
const CATS=['Todos','Spumante','Champagne','Bianco','Rosato','Rosso','Dolce'];
let lang=localStorage.getItem('lang')||'pt', fCat='Todos', fQ='';
function L(){return I18N[lang];}
function poleT(p){return lang==='pt'?p:(POLES[p]?POLES[p][lang]:p);}
function catT(c){return CATPT[c][lang];}
function tipT(t){return lang==='pt'?t:(TIPT[t]?TIPT[t][lang]:t);}
function decT(d){return d.replace('Sim',L().yes).replace('Não',L().no);}

const langsEl=document.getElementById('langs');
['pt','it','en'].forEach(lc=>{const b=document.createElement('div');b.className='lang'+(lc===lang?' on':'');b.textContent=lc.toUpperCase();
 b.onclick=()=>{lang=lc;localStorage.setItem('lang',lc);document.documentElement.lang=lc;[...langsEl.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');applyStatic();render();if(detail.classList.contains('show'))openDetail(curIdx,true);};
 langsEl.appendChild(b);});

const chipsEl=document.getElementById('chips');
function buildChips(){chipsEl.innerHTML='';CATS.forEach(c=>{const b=document.createElement('div');b.className='chip'+(c===fCat?' on':'');
 b.textContent=c==='Todos'?L().all:catT(c);b.onclick=()=>{fCat=c;buildChips();render();};chipsEl.appendChild(b);});}
function applyStatic(){document.getElementById('t-title').textContent=L().title;document.getElementById('t-back').textContent=L().back;
 document.getElementById('q').placeholder=L().search;buildChips();}

const grid=document.getElementById('grid'),countEl=document.getElementById('count');
document.getElementById('q').addEventListener('input',e=>{fQ=e.target.value.toLowerCase().trim();render();});
function match(w){if(fCat!=='Todos'&&w.cat!==fCat)return false;if(!fQ)return true;return (w.nm+' '+w.pr+' '+w.gr+' '+w.reg).toLowerCase().includes(fQ);}
function render(){const list=WINES.filter(match);countEl.textContent=list.length+' '+(list.length===1?L().lab1:L().lab);grid.innerHTML='';
 if(!list.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">'+L().empty+'</div>';return;}
 list.forEach(w=>{const i=WINES.indexOf(w);const el=document.createElement('div');el.className='card';
  el.style.setProperty('--g',w.col);el.style.setProperty('--accent','var(--c-'+w.cat+')');
  el.innerHTML=`<div class="ph"><span class="tag" style="background:var(--c-${w.cat})">${catT(w.cat)}</span><img loading="lazy" src="${w.img}" onerror="this.style.opacity=0"></div><div class="info"><div class="nm">${w.nm}</div><div class="pr">${w.pr}</div><div class="pz">${w.pz||''}</div></div>`;
  el.onclick=()=>openDetail(i);grid.appendChild(el);});}

const DECLBL={pt:{y:"Por que decantar",n:"Por que não decantar"},it:{y:"Perché decantare",n:"Perché non decantare"},en:{y:"Why decant",n:"Why not decant"}};
const PHELP={
 pt:[["Corpo","Leve","presença leve e delicada na boca","Encorpado","denso, encorpa a boca, com mais estrutura e álcool"],
     ["Doçura","Seco","sem açúcar perceptível","Doce","açúcar residual perceptível, típico de sobremesa"],

     ["Taninos (tintos)","Macio","taninos sedosos e arredondados","Tânico","taninos firmes que secam a boca; pedem carne/gordura"],
     ["Textura (brancos/espumantes)","Fresco","leve, direto e cortante","Cremoso","textura macia e envolvente (borras/madeira)"],
     ["Aromas","Delicado","aromas sutis e discretos","Intenso","aromas que saltam da taça"]],
 it:[["Corpo","Leggero","presenza leggera e delicata in bocca","Corposo","denso, riempie la bocca, con più struttura e alcol"],
     ["Dolcezza","Secco","senza zucchero percepibile","Dolce","zucchero residuo percepibile, tipico da dessert"],
     ["Acidità","Morbido","acidità bassa, morbida e rotonda","Vibrante","acidità alta: rinfresca la bocca e fa salivare"],
     ["Tannini (rossi)","Morbido","tannini setosi e arrotondati","Tannico","tannini fermi che asciugano la bocca; chiedono carne/grasso"],
     ["Texture (bianchi/spumanti)","Fresco","leggero, diretto e tagliente","Cremoso","texture morbida e avvolgente (lieviti/legno)"],
     ["Aromi","Delicato","aromi sottili e discreti","Intenso","aromi che esplodono dal calice"]],
 en:[["Body","Light","light, delicate presence in the mouth","Full","dense, fills the mouth, more structure and alcohol"],
     ["Sweetness","Dry","no perceptible sugar","Sweet","perceptible residual sugar, typical of dessert"],
     ["Acidity","Soft","low, round, gentle acidity","Vibrant","high acidity: refreshes the mouth, makes you salivate"],
     ["Tannins (reds)","Smooth","silky, rounded tannins","Tannic","firm tannins that dry the mouth; call for meat/fat"],
     ["Texture (whites/sparkling)","Fresh","light, direct and crisp","Creamy","soft, enveloping texture (lees/oak)"],
     ["Aromas","Delicate","subtle, discreet aromas","Intense","aromas that leap from the glass"]]};
function perfHelp(){return PHELP[lang].map(function(g){return '<div class="gr"><span class="t">'+g[0]+'</span><b>'+g[1]+'</b> — '+g[2]+'. <b>'+g[3]+'</b> — '+g[4]+'.</div>';}).join('');}
function togglePerfInfo(e){e.stopPropagation();var el=document.getElementById('perfhelp');if(el)el.hidden=!el.hidden;}
function gauge(b){var v=b[2],pos=6+((v-1)/5)*88,st=v<=2?"L":(v>=5?"R":"M");var lc=st==="L"?"p on":"p off",rc=st==="R"?"p r on":"p r off";return `<div class="axis"><div class="axhead"><span class="${lc}">${poleT(b[0])}</span><span class="${rc}">${poleT(b[1])}</span></div><div class="track"><div class="fill" style="width:${pos}%"></div><div class="knob" style="left:${pos}%"></div></div></div>`;}function bars(p){return p.map(gauge).join('');}
function grapes(g){return g.split(/\s*·\s*/).map(x=>`<span class="grape">${x}</span>`).join('');}
function tipos(t){return ALLT.map(x=>`<span class="tipo${t.includes(x)?' on':''}">${tipT(x)}</span>`).join('');}
const detail=document.getElementById('detail'),dwrap=document.getElementById('dwrap');let curIdx=0;
function openDetail(i,keep){curIdx=i;const w=WINES[i];detail.style.setProperty('--accent','var(--c-'+w.cat+')');detail.style.setProperty('--g',w.col);
 dwrap.innerHTML=`<div class="hero" style="--g:${w.col}"><img src="${w.img}" onerror="this.style.display='none'"></div>
  <div style="text-align:center"><span class="dtag">${catT(w.cat)}</span></div>
  <div class="dhead"><div><div class="dname">${w.nm}</div><div class="dprod">${w.pr}</div><div class="dmeta">${w.reg}</div></div><div class="dprice">${w.pz||''}</div></div>
  ${w.gr?`<div class="sec"><div class="lbl">${L().comp}</div><div class="grapes">${grapes(w.gr)}</div></div>`:''}
  <div class="sec"><div class="lbl">${L().perf} <span class="pinfo" onclick="togglePerfInfo(event)">?</span></div><div class="perfil">${bars(w.perfil)}</div><div class="perfhelp" id="perfhelp" hidden>${perfHelp()}</div></div>
  ${w.hist[lang]?`<div class="sec"><div class="lbl">${L().hist}</div><p>${w.hist[lang]}</p></div>`:''}
  ${w.arom[lang]?`<div class="sec"><div class="lbl">${L().arom}</div><p>${w.arom[lang]}</p></div>`:''}
  <div class="sec"><div class="lbl">${L().harm}</div><div class="tipos">${tipos(w.tipos)}</div></div>
  <div class="sec"><div class="serv"><div class="servbox"><div class="k">${L().dec}</div><div class="v">${decT(w.decant)}</div></div>
    <div class="servbox"><div class="k">${L().temp}</div><div class="v">${w.temp}</div></div></div><div class="decnote"><span class="declbl">${w.decant.startsWith("Sim")?DECLBL[lang].y:DECLBL[lang].n}</span>${w.decwhy[lang]}</div></div>
  ${w.scr[lang]?`<div class="frase">“${w.scr[lang]}”</div>`:''}`;
 if(!keep){detail.scrollTop=0;detail.classList.add('show');history.pushState({d:1},'');}}
function closeDetail(){detail.classList.remove('show');}
document.getElementById('dback').onclick=()=>{if(history.state&&history.state.d)history.back();else closeDetail();};
window.addEventListener('popstate',()=>{if(detail.classList.contains('show'))closeDetail();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&detail.classList.contains('show'))history.back();});
document.documentElement.lang=lang;applyStatic();render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script></body></html>
